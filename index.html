 <!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TEST123</title>
  <link rel="stylesheet" href="./style.css?v=10" />
</head>

<body>

  <section class="hero">
    <video autoplay muted loop playsinline class="hero-video">
      <source src="https://raw.githubusercontent.com/stormieperformance/smt-demo/main/hero.mp4" type="video/mp4">
    </video>

    <div class="hero-content">
      <h1>STORMIE<br>MUAY THAI</h1>
      <p>Träna Muay Thai i Stockholm. Alla nivåer välkomna.</p>
      <a href="#" class="btn">Boka pass</a>
    </div>
  </section>

  <section class="news-section">
    <h2>Nyheter</h2>
    <div id="news"></div>
  </section>

 <section class="coaches">
  <h2>Coaches</h2>

  <div class="coaches-grid">
    <div class="coach-card">
      <img src="https://images.pexels.com/photos/1552242/pexels-photo-1552242.jpeg" alt="Coach">
      <h3>Alex Rivera</h3>
      <p>Head Coach</p>
    </div>

    <div class="coach-card">
      <img src="https://images.pexels.com/photos/260447/pexels-photo-260447.jpeg" alt="Coach">
      <h3>Marcus Lee</h3>
      <p>Muay Thai Coach</p>
    </div>

    <div class="coach-card">
      <img src="https://images.pexels.com/photos/414029/pexels-photo-414029.jpeg" alt="Coach">
      <h3>Sara Kim</h3>
      <p>Conditioning Coach</p>
    </div>
  </div>
</section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/smt-demo/app.js?v=123"></script>

</body>
</html>
